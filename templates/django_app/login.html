{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'Segoe UI', sans-serif;

            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -30px;

            background-image: url("/static/img/piqsels.com-id-olzqm.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            filter: blur(8px) brightness(.55);
            transform: scale(1.08);

            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;

            background: radial-gradient(
                circle at center,
                rgba(0,0,0,.10),
                rgba(0,0,0,.75)
            );

            z-index: -1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(1.03);
                filter: blur(8px);
            }

            to {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        .main-btn-container {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 100;
        }

        .main-btn {
            display: inline-block;
            padding: 13px 28px;

            color: #00ffff;
            text-decoration: none;

            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;

            border: 2px solid #00ffff;
            background: rgba(0, 10, 20, .75);

            box-shadow:
                0 0 15px #00ffff,
                inset 0 0 15px rgba(0,255,255,.2);

            transition: .3s;
        }

        .main-btn::before {
            content: "< ";
        }

        .main-btn:hover {
            background: #00ffff;
            color: #000;
            transform: translateX(-6px);
            box-shadow:
                0 0 25px #00ffff,
                0 0 60px #00ffff;
        }

        .form-signin {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 430px;
        }

        section {
            width: 100%;
            min-height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: none !important;
        }

        .form-box {
            width: 430px;
            padding: 45px 38px;

            background: rgba(0, 0, 0, .45);
            backdrop-filter: blur(18px);

            border: 1px solid rgba(0,255,255,.35);
            border-radius: 18px;

            box-shadow:
                0 0 25px rgba(0,255,255,.35),
                inset 0 0 25px rgba(0,255,255,.10);
        }

        .form-value h2 {
            margin-bottom: 30px;

            color: white;
            font-size: 34px;
            font-weight: 800;

            letter-spacing: 4px;
            text-transform: uppercase;

            text-shadow:
                0 0 10px #00ffff,
                0 0 25px #00ffff;
        }

        .inputbox {
            position: relative;
            margin-bottom: 25px;
        }

        .inputbox ion-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ffff;
            font-size: 20px;
            z-index: 2;
        }

        .form-control {
            height: 52px;

            background: rgba(0, 10, 20, .75) !important;
            border: 1px solid rgba(0,255,255,.4) !important;

            color: white !important;

            box-shadow:
                inset 0 0 10px rgba(0,255,255,.15);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,.65);
        }

        .form-control:focus {
            border-color: #00ffff !important;
            box-shadow:
                0 0 15px #00ffff,
                inset 0 0 10px rgba(0,255,255,.25) !important;
        }

        .btn-light {
            width: 100%;
            height: 52px;

            margin-top: 10px;

            background: transparent !important;
            border: 2px solid #00ffff !important;

            color: #00ffff !important;

            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;

            transition: .3s;
        }

        .btn-light:hover {
            background: #00ffff !important;
            color: #000 !important;

            box-shadow:
                0 0 25px #00ffff,
                0 0 60px #00ffff;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;

            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,.015),
                rgba(255,255,255,.015) 1px,
                transparent 1px,
                transparent 6px
            );
        }
    </style>
</head>

<body>

    <div class="main-btn-container">
        <a href="{% url 'django_app:home_main' %}" class="main-btn">
            Main
        </a>
    </div>

    <main class="form-signin">
        <form action="{% url 'django_app:login' %}" method="post">
            {% csrf_token %}

            <section>
                <div class="form-box">
                    <div class="form-value">
                        <h2>Login</h2>

                        <div class="inputbox">
                            <ion-icon name="mail-outline"></ion-icon>
                            <input type="text"
                                   class="form-control"
                                   placeholder="Ваш логин или email"
                                   required
                                   name="username">
                        </div>

                        <div class="inputbox">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                            <input type="password"
                                   class="form-control"
                                   placeholder="Ваш пароль"
                                   required
                                   name="password">
                        </div>

                        <button type="submit" class="btn btn-light">
                            Log in
                        </button>

                        {% if error_message %}
                            <div class="alert alert-danger mt-3" role="alert">
                                {{ error_message }}
                            </div>
                        {% endif %}
                    </div>
                </div>
            </section>
        </form>
    </main>

    <div class="scanlines"></div>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>
</html>
